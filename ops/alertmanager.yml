global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: oncall-critical
      repeat_interval: 30m
    - matchers:
        - severity="warning"
      receiver: oncall-warning
      repeat_interval: 2h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "http://oncall-webhook:8080/alerts/default"
        send_resolved: true
    slack_configs:
      - send_resolved: true
        api_url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
        channel: "#email-warmup-alerts"
        title: "[default] {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}"
  - name: oncall-critical
    webhook_configs:
      - url: "http://oncall-webhook:8080/alerts/critical"
        send_resolved: true
    pagerduty_configs:
      - routing_key: ${ALERTMANAGER_PAGERDUTY_ROUTING_KEY}
        severity: critical
        send_resolved: true
    email_configs:
      - to: ${ALERTMANAGER_ESCALATION_EMAIL}
        from: ${ALERTMANAGER_FROM_EMAIL}
        smarthost: ${ALERTMANAGER_SMARTHOST}
        auth_username: ${ALERTMANAGER_SMTP_USERNAME}
        auth_password: ${ALERTMANAGER_SMTP_PASSWORD}
        send_resolved: true
  - name: oncall-warning
    webhook_configs:
      - url: "http://oncall-webhook:8080/alerts/warning"
        send_resolved: true
    slack_configs:
      - send_resolved: true
        api_url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
        channel: "#email-warmup-warnings"
        title: "[warning] {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}"
