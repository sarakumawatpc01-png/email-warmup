groups:
  - name: warmup-slo-alerts
    rules:
      - alert: WarmupQueueBacklogHigh
        expr: sum(warmup_queue_backlog{service="warmup-engine"}) > 200
        for: 10m
        labels:
          severity: warning
          service: warmup-engine
        annotations:
          summary: "Warmup queue backlog is high"
          description: "Queue backlog exceeded 200 for 10m."

      - alert: WarmupSendSuccessRatioLow
        expr: warmup_slo_send_success_ratio{service="warmup-engine",provider="all"} < 0.90
        for: 15m
        labels:
          severity: critical
          service: warmup-engine
        annotations:
          summary: "Warmup send success ratio degraded"
          description: "Global send success ratio is below 0.90 for 15m."

      - alert: WarmupSendSuccessRatioBurnRateFast
        expr: warmup_slo_send_success_ratio{service="warmup-engine",provider="all"} < 0.80
        for: 5m
        labels:
          severity: critical
          service: warmup-engine
        annotations:
          summary: "Warmup SLO fast burn-rate breach"
          description: "Send success ratio dropped below 0.80 over a short window."

      - alert: WarmupSendSuccessRatioBurnRateSlow
        expr: warmup_slo_send_success_ratio{service="warmup-engine",provider="all"} < 0.92
        for: 1h
        labels:
          severity: warning
          service: warmup-engine
        annotations:
          summary: "Warmup SLO slow burn-rate breach"
          description: "Send success ratio below 0.92 for 1 hour."

      - alert: WarmupPlacementScoreLow
        expr: warmup_slo_placement_score{service="warmup-engine",provider="all"} < 0.75
        for: 20m
        labels:
          severity: warning
          service: warmup-engine
        annotations:
          summary: "Warmup inbox placement score low"
          description: "Placement score stayed below 0.75 for 20m."

      - alert: WarmupAdminApiLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(warmup_http_request_duration_seconds_bucket{service="warmup-engine",path=~"/warmup/admin/.*"}[5m])) by (le)) > 2
        for: 10m
        labels:
          severity: warning
          service: warmup-engine
        annotations:
          summary: "Warmup admin API latency high"
          description: "Warmup admin API p95 latency exceeded 2s for 10m."

      - alert: WarmupAdminApiErrorRateHigh
        expr: sum(rate(warmup_http_requests_total{service="warmup-engine",path=~"/warmup/admin/.*",status_code=~"4..|5.."}[5m])) > 1
        for: 10m
        labels:
          severity: warning
          service: warmup-engine
        annotations:
          summary: "Warmup admin API error rate high"
          description: "Warmup admin API produced >1 errors/sec for 10m."
