global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts/warmup-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "warmup-engine"
    static_configs:
      - targets: ["warmup_engine:8003"]
    metrics_path: /metrics/prometheus
