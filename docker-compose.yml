services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-email_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-email_saas}
      POSTGRES_DB: ${POSTGRES_DB:-email_saas}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    networks:
      - app-net

  auth:
    build: ./backend/services/auth
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    networks:
      - app-net

  lead_service:
    build: ./backend/services/lead-service
    environment:
      DATABASE_URL: postgresql+psycopg://email_saas:email_saas@postgres:5432/email_saas
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
    networks:
      - app-net

  warmup_engine:
    build: ./warmup-engine
    environment:
      REDIS_URL: redis://redis:6379/0
      WARMUP_DATABASE_URL: ${WARMUP_DATABASE_URL:-postgresql+psycopg2://email_saas:email_saas@postgres:5432/email_saas}
      WARMUP_SQLITE_FALLBACK_URL: ${WARMUP_SQLITE_FALLBACK_URL:-sqlite+pysqlite:///./warmup.db}
      PROMETHEUS_ENABLED: "true"
      OTEL_ENABLE_CONSOLE_EXPORTER: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      WARMUP_ADMIN_API_KEY: ${WARMUP_ADMIN_API_KEY:-}
      WARMUP_QUEUE_VISIBILITY_TIMEOUT_SECONDS: ${WARMUP_QUEUE_VISIBILITY_TIMEOUT_SECONDS:-45}
    depends_on:
      - postgres
      - redis
    networks:
      - app-net

  warmup_worker_schedule_generation:
    build: ./warmup-engine
    command: ["rq", "worker", "schedule_generation", "--url", "redis://redis:6379/0"]
    environment:
      REDIS_URL: redis://redis:6379/0
      WARMUP_DATABASE_URL: ${WARMUP_DATABASE_URL:-postgresql+psycopg2://email_saas:email_saas@postgres:5432/email_saas}
      WARMUP_SQLITE_FALLBACK_URL: ${WARMUP_SQLITE_FALLBACK_URL:-sqlite+pysqlite:///./warmup.db}
    depends_on:
      - postgres
      - redis
      - warmup_engine
    networks:
      - app-net

  warmup_worker_send_execution:
    build: ./warmup-engine
    command: ["rq", "worker", "send_execution", "--url", "redis://redis:6379/0"]
    environment:
      REDIS_URL: redis://redis:6379/0
      WARMUP_DATABASE_URL: ${WARMUP_DATABASE_URL:-postgresql+psycopg2://email_saas:email_saas@postgres:5432/email_saas}
      WARMUP_SQLITE_FALLBACK_URL: ${WARMUP_SQLITE_FALLBACK_URL:-sqlite+pysqlite:///./warmup.db}
    depends_on:
      - postgres
      - redis
      - warmup_engine
    networks:
      - app-net

  warmup_worker_reply_simulation:
    build: ./warmup-engine
    command: ["rq", "worker", "reply_simulation", "--url", "redis://redis:6379/0"]
    environment:
      REDIS_URL: redis://redis:6379/0
      WARMUP_DATABASE_URL: ${WARMUP_DATABASE_URL:-postgresql+psycopg2://email_saas:email_saas@postgres:5432/email_saas}
      WARMUP_SQLITE_FALLBACK_URL: ${WARMUP_SQLITE_FALLBACK_URL:-sqlite+pysqlite:///./warmup.db}
    depends_on:
      - postgres
      - redis
      - warmup_engine
    networks:
      - app-net

  warmup_worker_reputation_scoring:
    build: ./warmup-engine
    command: ["rq", "worker", "reputation_scoring", "--url", "redis://redis:6379/0"]
    environment:
      REDIS_URL: redis://redis:6379/0
      WARMUP_DATABASE_URL: ${WARMUP_DATABASE_URL:-postgresql+psycopg2://email_saas:email_saas@postgres:5432/email_saas}
      WARMUP_SQLITE_FALLBACK_URL: ${WARMUP_SQLITE_FALLBACK_URL:-sqlite+pysqlite:///./warmup.db}
    depends_on:
      - postgres
      - redis
      - warmup_engine
    networks:
      - app-net

  verification_engine:
    build: ./verification-engine
    networks:
      - app-net

  ai_agent:
    build: ./ai-agent
    networks:
      - app-net

  backend:
    build: ./backend
    environment:
      AUTH_SERVICE_URL: http://auth:8001
      LEAD_SERVICE_URL: http://lead_service:8002
      WARMUP_SERVICE_URL: http://warmup_engine:8003
      VERIFICATION_SERVICE_URL: http://verification_engine:8004
      AI_AGENT_SERVICE_URL: http://ai_agent:8005
      CRM_SERVICE_URL: http://crm:8070
      BILLING_SERVICE_URL: http://billing_service:3001
      WHATSAPP_SERVICE_URL: http://whatsapp_service:3002
      OTEL_ENABLE_CONSOLE_EXPORTER: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      - auth
      - lead_service
      - warmup_engine
      - verification_engine
      - ai_agent
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.email-warmup-api.rule=Host(`${TRAEFIK_HOST:-email-warmup.agencyfic.com}`) && (PathPrefix(`/auth`) || PathPrefix(`/leads`) || PathPrefix(`/verification`) || PathPrefix(`/warmup`) || PathPrefix(`/ai`) || PathPrefix(`/billing`) || PathPrefix(`/whatsapp`) || PathPrefix(`/policy`) || PathPrefix(`/health`))
      - traefik.http.routers.email-warmup-api.entrypoints=websecure
      - traefik.http.routers.email-warmup-api.tls.certresolver=letsencrypt
      - traefik.http.routers.email-warmup-api.priority=200
      - traefik.http.services.email-warmup-api.loadbalancer.server.port=8000
      - traefik.http.routers.email-warmup-api-compat.rule=Host(`${TRAEFIK_HOST:-email-warmup.agencyfic.com}`) && PathPrefix(`/api`)
      - traefik.http.routers.email-warmup-api-compat.entrypoints=websecure
      - traefik.http.routers.email-warmup-api-compat.tls.certresolver=letsencrypt
      - traefik.http.routers.email-warmup-api-compat.priority=210
      - traefik.http.routers.email-warmup-api-compat.middlewares=email-warmup-api-strip
      - traefik.http.middlewares.email-warmup-api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.email-warmup-api-compat.service=email-warmup-api
    networks:
      - app-net
      - proxy

  billing_service:
    build: ./billing-service
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      BILLING_ADMIN_API_KEY: ${BILLING_ADMIN_API_KEY:-}
      BILLING_PROVIDER_CONFIG_PATH: ${BILLING_PROVIDER_CONFIG_PATH:-/app/data/payment-providers.enc}
      BILLING_CONFIG_ENC_KEY: ${BILLING_CONFIG_ENC_KEY:-}
      BILLING_SECRET_BACKEND: ${BILLING_SECRET_BACKEND:-file}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_PAYMENT_CONFIG_PATH: ${VAULT_PAYMENT_CONFIG_PATH:-secret/data/email-warmup/billing/providers}
      KMS_ENCRYPT_URL: ${KMS_ENCRYPT_URL:-}
      KMS_DECRYPT_URL: ${KMS_DECRYPT_URL:-}
      KMS_AUTH_TOKEN: ${KMS_AUTH_TOKEN:-}
      BILLING_WEBHOOK_LEDGER_PATH: ${BILLING_WEBHOOK_LEDGER_PATH:-/app/data/webhook-ledger.log}
      BILLING_WEBHOOK_INDEX_PATH: ${BILLING_WEBHOOK_INDEX_PATH:-/app/data/webhook-index.json}
      BILLING_RECONCILIATION_RUNS_PATH: ${BILLING_RECONCILIATION_RUNS_PATH:-/app/data/reconciliation-runs.json}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      PHONEPE_MERCHANT_ID: ${PHONEPE_MERCHANT_ID:-}
      PHONEPE_SALT_KEY: ${PHONEPE_SALT_KEY:-}
      PHONEPE_WEBHOOK_SECRET: ${PHONEPE_WEBHOOK_SECRET:-}
      PAYTM_MERCHANT_ID: ${PAYTM_MERCHANT_ID:-}
      PAYTM_MERCHANT_KEY: ${PAYTM_MERCHANT_KEY:-}
      PAYTM_WEBHOOK_SECRET: ${PAYTM_WEBHOOK_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    networks:
      - app-net

  otel_collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - app-net

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    depends_on:
      - alertmanager
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alerts:/etc/prometheus/alerts:ro
    networks:
      - app-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./ops/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - app-net

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana-dashboard-warmup.json:/var/lib/grafana/dashboards/warmup.json:ro
      - ./ops/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - app-net

  whatsapp_service:
    build: ./backend/services/whatsapp-service
    networks:
      - app-net

  crm:
    image: nginx:alpine
    command: ["/bin/sh", "-c", "echo '<h1>Twenty CRM Integration Stub</h1>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
    networks:
      - app-net

  mautic-client-template:
    image: php:8.2-apache
    command: ["/bin/sh", "-c", "echo '<?php echo \"Mautic client template\"; ?>' > /var/www/html/index.php && apache2-foreground"]
    networks:
      - app-net

  frontend-client:
    build: ./frontend/client
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.email-warmup-client.rule=Host(`${TRAEFIK_HOST:-email-warmup.agencyfic.com}`) && PathPrefix(`/`)
      - traefik.http.routers.email-warmup-client.entrypoints=websecure
      - traefik.http.routers.email-warmup-client.tls.certresolver=letsencrypt
      - traefik.http.routers.email-warmup-client.priority=10
      - traefik.http.services.email-warmup-client.loadbalancer.server.port=80
    networks:
      - proxy

  frontend-admin:
    build: ./frontend/superadmin
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.email-warmup-admin.rule=Host(`${TRAEFIK_HOST:-email-warmup.agencyfic.com}`) && PathPrefix(`/admin`)
      - traefik.http.routers.email-warmup-admin.entrypoints=websecure
      - traefik.http.routers.email-warmup-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.email-warmup-admin.priority=100
      - traefik.http.routers.email-warmup-admin.middlewares=email-warmup-admin-strip
      - traefik.http.middlewares.email-warmup-admin-strip.stripprefix.prefixes=/admin
      - traefik.http.services.email-warmup-admin.loadbalancer.server.port=80
    networks:
      - proxy

volumes:
  pg_data:
  grafana_data:

networks:
  app-net:
    driver: bridge
  proxy:
    external: true
